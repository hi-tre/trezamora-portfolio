<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<title>Page not found · Tre Zamora</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{--navy:#043257;--blue:#28608a;--blue-mid:#1e4f73;--blue-lt:#d6e8f5;--yellow:#ffd45c;--white:#fff;--ease:cubic-bezier(.4,0,.2,1)}
  *{margin:0;padding:0;box-sizing:border-box}
  html{font-size:16px;overflow-x:hidden}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--navy);color:var(--white);min-height:100vh;width:100%;max-width:100%;
    display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;position:relative;padding:2rem}
  .blob-a{position:absolute;width:760px;height:760px;border-radius:50%;background:radial-gradient(circle,var(--blue-mid) 0%,transparent 65%);opacity:.5;right:-200px;top:-220px;pointer-events:none}
  .blob-b{position:absolute;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,var(--blue) 0%,transparent 70%);opacity:.32;left:-140px;bottom:-200px;pointer-events:none}
  .wrap{position:relative;z-index:1;max-width:600px}
  .logo{display:inline-flex;align-items:center;gap:.55rem;font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;color:#fff;margin-bottom:2.5rem;text-decoration:none}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--yellow)}
  .code{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(5rem,16vw,9rem);line-height:1;letter-spacing:-.04em;color:#fff}
  .code span{color:#7db4d8}
  .eyebrow{color:var(--yellow);font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;margin:1.4rem 0 1rem}
  h1{font-family:'Syne',sans-serif;font-weight:700;font-size:clamp(1.4rem,3vw,2rem);letter-spacing:-.02em;margin-bottom:1rem}
  p{color:var(--blue-lt);font-size:1rem;line-height:1.7;margin-bottom:2.2rem}
  .btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 1.9rem;font-size:.74rem;font-weight:600;
    letter-spacing:.09em;text-transform:uppercase;text-decoration:none;transition:.22s var(--ease);border:2px solid}
  .btn-primary{background:var(--yellow);color:var(--navy);border-color:var(--yellow)}
  .btn-primary:hover{background:#fff;border-color:#fff}
  .btn-secondary{background:transparent;color:#fff;border-color:rgba(255,255,255,.28)}
  .btn-secondary:hover{border-color:#fff}
</style>
</head>
<body>
  <div class="blob-a"></div>
  <div class="blob-b"></div>
  <div class="wrap">
    <a class="logo" href="/"><span class="dot"></span>Tre Zamora</a>
    <div class="code">4<span>0</span>4</div>
    <p class="eyebrow">Page not found</p>
    <h1>This page took a wrong turn.</h1>
    <p>The link may be broken or the page may have moved. Let's get you back to solid ground.</p>
    <div class="btns">
      <a class="btn btn-primary" href="/">Back home</a>
      <a class="btn btn-secondary" href="/#work">View the work</a>
    </div>
  </div>
</body>
</html>
